name: Daily Generate PR

on:
    schedule:
        - cron: "10 0 * * *"
    workflow_dispatch:

permissions:
    contents: write
    pull-requests: write

jobs:
    generate:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Install dependencies
              run: pip install -r requirements.txt

            - name: Ensure Gemini secret is configured
              env:
                  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
              run: |
                  if [ -z "$GEMINI_API_KEY" ]; then
                    echo "GEMINI_API_KEY is not configured in repository secrets." >&2
                    exit 1
                  fi

            - name: Compute date
              id: vars
              run: echo "today=$(date -u +%F)" >> "$GITHUB_OUTPUT"

            - name: Collect chart ids from open daily PRs
              id: reserved
              env:
                  GH_TOKEN: ${{ github.token }}
                  TARGET_DATE: ${{ steps.vars.outputs.today }}
              run: |
                  python - <<'PY'
                  import json
                  import os
                  import re
                  import subprocess

                  target_date = os.environ["TARGET_DATE"]
                  output_path = os.environ["GITHUB_OUTPUT"]
                  branch_prefix = f"auto/daily-{target_date}-"
                  chart_id_re = re.compile(r'^\+\s*"chart_id"\s*:\s*"([a-z0-9-]+)"')
                  diff_file_re = re.compile(r"^diff --git a/(.+) b/(.+)$")

                  prs_raw = subprocess.check_output(
                      ["gh", "pr", "list", "--state", "open", "--json", "number,headRefName", "--limit", "100"],
                      text=True,
                  )
                  prs = json.loads(prs_raw)
                  pr_numbers = [
                      str(pr.get("number"))
                      for pr in prs
                      if str(pr.get("headRefName", "")).startswith(branch_prefix)
                  ]

                  reserved: list[str] = []
                  seen: set[str] = set()
                  for number in pr_numbers:
                      result = subprocess.run(
                          ["gh", "pr", "diff", number],
                          text=True,
                          capture_output=True,
                          check=False,
                      )
                      if result.returncode != 0:
                          continue
                      in_target_post = False
                      for line in result.stdout.splitlines():
                          diff_match = diff_file_re.match(line)
                          if diff_match:
                              post_path = diff_match.group(2)
                              in_target_post = (
                                  post_path.startswith(f"site/posts/{target_date}")
                                  and post_path.endswith(".json")
                                  and post_path != "site/posts/index.json"
                              )
                              continue
                          if not in_target_post:
                              continue
                          chart_match = chart_id_re.match(line)
                          if not chart_match:
                              continue
                          chart_id = chart_match.group(1)
                          if chart_id in seen:
                              continue
                          seen.add(chart_id)
                          reserved.append(chart_id)

                  with open(output_path, "a", encoding="utf-8") as fh:
                      fh.write(f"chart_ids={','.join(reserved)}\n")
                  print(f"reserved chart ids: {reserved}")
                  PY

            - name: Generate daily post
              run: >
                  python -m scripts.generate_daily_post
                  --date "${{ steps.vars.outputs.today }}"
                  --variant-seed "${{ github.run_id }}-${{ github.run_attempt }}"
                  --forbid-chart-ids "${{ steps.reserved.outputs.chart_ids }}"
              env:
                  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

            - name: Validate generated JS
              id: validate
              continue-on-error: true
              run: python -m scripts.validate_generated_js --date "${{ steps.vars.outputs.today }}"

            - name: Repair with Gemini when needed
              if: steps.validate.outcome == 'failure'
              continue-on-error: true
              run: python -m scripts.repair_with_gemini --date "${{ steps.vars.outputs.today }}" --max-attempts 2
              env:
                  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

            - name: Re-validate and keep code_only if needed
              run: python -m scripts.validate_generated_js --date "${{ steps.vars.outputs.today }}" --allow-violations

            - name: Rebuild post index
              run: python -m scripts.build_index

            - name: Embed ECharts bundle
              run: python -m scripts.embed_echarts

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"

            - name: Install frontend dependencies
              run: npm ci

            - name: Build React app
              run: npm run build

            - name: Export review JS files
              run: python -m scripts.export_review_js --date "${{ steps.vars.outputs.today }}"

            - name: Upload generated site artifact
              uses: actions/upload-artifact@v4
              with:
                  name: daily-site-${{ github.run_id }}
                  path: site
                  if-no-files-found: error
                  retention-days: 7

            - name: Create pull request
              id: cpr
              uses: peter-evans/create-pull-request@v6
              with:
                  branch: auto/daily-${{ steps.vars.outputs.today }}-${{ github.run_id }}-${{ github.run_attempt }}
                  title: "Daily chart: ${{ steps.vars.outputs.today }} (run ${{ github.run_id }})"
                  commit-message: "chore: daily chart update for ${{ steps.vars.outputs.today }} (run ${{ github.run_id }})"
                  body: |
                      Automated daily chart generation.

                      - Generated a new post under `site/posts/${{ steps.vars.outputs.today }}*.json`
                      - Ran validator and repair loop
                      - Exported review files under `site/review/<post-id>/`
                      - Rebuilt `site/posts/index.json`
                      - Embedded ECharts in `site/sandbox.html`

                      @codex review
                  labels: automated,daily-chart

            - name: Trigger Codex PR review comment
              if: steps.cpr.outputs.pull-request-number != ''
              run: gh pr comment "${{ steps.cpr.outputs.pull-request-number }}" --body "@codex review"
              env:
                  GH_TOKEN: ${{ github.token }}
