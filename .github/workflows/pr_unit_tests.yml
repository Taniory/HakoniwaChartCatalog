name: PR Unit Tests

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/pr_unit_tests.yml"
      - "package.json"
      - "package-lock.json"
      - "requirements.txt"
      - "scripts/**"
      - "src/**"
      - "site/**"
      - "tests/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check sandbox inline placeholders
        run: python -m scripts.strip_sandbox_inlines --check

      - name: Run Python unit tests
        run: python -m unittest discover -s tests -p "test_*.py"

  js-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Run sanitizer unit tests
        run: npm run test:sandbox-sanitizer

  build-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
