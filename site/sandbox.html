<!doctype html>
<html lang="ja">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta
            http-equiv="Content-Security-Policy"
            content="default-src 'none'; connect-src 'none'; img-src 'none'; media-src 'none'; font-src 'none'; script-src 'unsafe-inline'; script-src-attr 'none'; style-src 'unsafe-inline'; base-uri 'none'; form-action 'none'; object-src 'none';"
        />
        <title>サンドボックス描画</title>
        <style>
            html, body {
              margin: 0;
              width: 100%;
              height: 100%;
              overflow: hidden;
              background: #ffffff;
            }

            #chart {
              width: 100%;
              height: 100%;
            }
        </style>
    </head>
    <body>
        <div id="chart"></div>
        <script id="echarts-inline">
            /*__ECHARTS_INLINE_START__*/
            /*__ECHARTS_INLINE_END__*/
        </script>
        <script>
            const chartDom = document.getElementById("chart");
            let chart = null;
            let resizeObserver = null;
            let parentOrigin = "*";
            let channelToken = null;
            let sectionCounter = 0;

            const BLOCKED_HTML_TAGS = new Set([
              "script",
              "iframe",
              "object",
              "embed",
              "link",
              "meta",
              "style",
              "base",
              "form"
            ]);
            const URL_ATTRS = new Set(["href", "src", "xlink:href"]);
            const ALLOWED_URL_HOSTS = new Set([
              window.location.hostname,
              "localhost",
              "127.0.0.1"
            ]);
            const ALLOWED_PARENT_HOSTS = new Set([
              window.location.hostname,
              "localhost",
              "127.0.0.1"
            ]);

            function send(type, requestId, payload) {
              if (!requestId || !channelToken) {
                return;
              }
              parent.postMessage({ type, request_id: requestId, channel_token: channelToken, ...payload }, parentOrigin);
            }

            function cloneJson(value) {
              return JSON.parse(JSON.stringify(value));
            }

            function isAllowedUrl(raw) {
              if (typeof raw !== "string") {
                return false;
              }
              const value = raw.trim();
              if (!value) {
                return true;
              }
              if (/^(?:javascript|data|vbscript|file):/i.test(value)) {
                return false;
              }
              if (/^\/\//.test(value)) {
                return false;
              }
              if (/^(?:\/(?!\/)|\.\/|\.\.\/|#)/.test(value)) {
                return true;
              }
              try {
                const parsed = new URL(value, window.location.href);
                if (parsed.protocol !== "http:" && parsed.protocol !== "https:") {
                  return false;
                }
                return ALLOWED_URL_HOSTS.has(parsed.hostname);
              } catch {
                return false;
              }
            }

            function isAllowedParentOrigin(origin) {
              if (typeof origin !== "string" || !origin || origin === "null") {
                return false;
              }
              try {
                const parsed = new URL(origin);
                if (parsed.protocol !== "http:" && parsed.protocol !== "https:") {
                  return false;
                }
                return ALLOWED_PARENT_HOSTS.has(parsed.hostname);
              } catch {
                return false;
              }
            }

            function sanitizeHtml(input) {
              const template = document.createElement("template");
              template.innerHTML = String(input);
              const nodes = template.content.querySelectorAll("*");
              for (const node of nodes) {
                const tagName = node.tagName.toLowerCase();
                if (BLOCKED_HTML_TAGS.has(tagName)) {
                  node.remove();
                  continue;
                }
                for (const attr of [...node.attributes]) {
                  const name = attr.name.toLowerCase();
                  const value = attr.value || "";
                  if (name === "style" || /^on/i.test(name)) {
                    node.removeAttribute(attr.name);
                    continue;
                  }
                  if (URL_ATTRS.has(name) && !isAllowedUrl(value)) {
                    node.removeAttribute(attr.name);
                  }
                }
              }
              return template.innerHTML;
            }

            function sanitizeHtmlResult(result) {
              if (result == null) {
                return result;
              }
              if (typeof result === "string") {
                return sanitizeHtml(result);
              }
              if (typeof HTMLElement !== "undefined" && result instanceof HTMLElement) {
                return sanitizeHtml(result.outerHTML);
              }
              return result;
            }

            function wrapHtmlFormatter(target, key) {
              if (!target || typeof target !== "object" || !(key in target)) {
                return;
              }
              const original = target[key];
              if (typeof original === "function") {
                target[key] = function wrappedFormatter(...args) {
                  return sanitizeHtmlResult(original.apply(this, args));
                };
                return;
              }
              if (typeof original === "string") {
                target[key] = sanitizeHtml(original);
              }
            }

            function validateOptionUrls(value, path = "option") {
              if (!value || typeof value !== "object") {
                return;
              }
              if (Array.isArray(value)) {
                value.forEach((item, index) => {
                  validateOptionUrls(item, `${path}[${index}]`);
                });
                return;
              }
              for (const [key, nextValue] of Object.entries(value)) {
                const currentPath = `${path}.${key}`;
                if ((key === "link" || key === "sublink") && typeof nextValue === "string" && !isAllowedUrl(nextValue)) {
                  throw new Error(`許可されていないURLです: ${currentPath}`);
                }
                if (nextValue && typeof nextValue === "object") {
                  validateOptionUrls(nextValue, currentPath);
                }
              }
            }

            function sanitizeFileName(raw) {
              const text = String(raw || "chart")
                .normalize("NFKC")
                .replace(/[\\/:*?"<>|\u0000-\u001f]/g, "_")
                .replace(/\s+/g, " ")
                .trim()
                .slice(0, 64);
              return text || "chart";
            }

            function enforceSaveAsImageName(option) {
              const saveAsImage = option?.toolbox?.feature?.saveAsImage;
              if (!saveAsImage || typeof saveAsImage !== "object") {
                return;
              }
              saveAsImage.name = sanitizeFileName(saveAsImage.name);
            }

            function hardenOption(option) {
              if (!option || typeof option !== "object") {
                throw new Error("option が構築されませんでした");
              }
              wrapHtmlFormatter(option.tooltip, "formatter");
              if (Array.isArray(option.series)) {
                for (const series of option.series) {
                  wrapHtmlFormatter(series?.tooltip, "formatter");
                }
              }
              wrapHtmlFormatter(option?.toolbox?.feature?.dataView, "optionToContent");
              validateOptionUrls(option);
              enforceSaveAsImageName(option);
            }

            function runSection(source, context) {
              if (!source) {
                return;
              }
              const executionKey = `section_${Date.now()}_${sectionCounter++}`;
              window.__sandboxExecutionState = { key: executionKey, context, error: null };
              const onError = (event) => {
                const current = window.__sandboxExecutionState;
                if (!current || current.key !== executionKey) {
                  return;
                }
                const message = event?.message || "script error";
                current.error = event?.error || new Error(message);
                event.preventDefault();
              };
              window.addEventListener("error", onError);
              const script = document.createElement("script");
              script.text = `"use strict";\n(() => {\nconst state = window.__sandboxExecutionState;\nif (!state || state.key !== ${JSON.stringify(executionKey)}) { return; }\nconst context = state.context;\nconst post = context.post;\nconst echarts = context.echarts;\nconst rawData = context.rawData;\nlet transformedData = context.transformedData;\nlet option = context.option;\n${source}\ncontext.transformedData = transformedData;\ncontext.option = option;\n})();`;
              document.body.appendChild(script);
              script.remove();
              window.removeEventListener("error", onError);
              const result = window.__sandboxExecutionState;
              delete window.__sandboxExecutionState;
              if (result && result.error) {
                throw result.error;
              }
            }

            function renderPost(post, requestId) {
              if (!post || typeof post !== "object") {
                throw new Error("post payload が不正です");
              }

              const context = {
                post,
                echarts: window.echarts,
                rawData: cloneJson(post.sample_data_json || {}),
                transformedData: cloneJson(post.sample_data_json || {}),
                option: {}
              };

              runSection(post.transform_js || "", context);
              runSection(post.echarts_js || "", context);
              runSection(post.custom_series_js || "", context);
              hardenOption(context.option);

              if (chart && typeof chart.dispose === "function") {
                chart.dispose();
              }
              chart = window.echarts.init(chartDom, null, { renderer: "canvas" });
              chart.setOption(context.option);
              chart.resize();
              send("render_ok", requestId, {});
            }

            window.addEventListener("resize", () => {
              if (chart && typeof chart.resize === "function") {
                chart.resize();
              }
            });

            if (window.ResizeObserver) {
              resizeObserver = new ResizeObserver(() => {
                if (chart && typeof chart.resize === "function") {
                  chart.resize();
                }
              });
              resizeObserver.observe(chartDom);
            }

            window.addEventListener("message", (event) => {
              if (event.source !== parent) {
                return;
              }

              const data = event.data || {};
              if (data.type !== "render" || typeof data.request_id !== "string" || typeof data.channel_token !== "string") {
                return;
              }
              if (!channelToken) {
                if (!isAllowedParentOrigin(event.origin)) {
                  return;
                }
                channelToken = data.channel_token;
                parentOrigin = event.origin || "*";
              }
              if (data.channel_token !== channelToken) {
                return;
              }
              if (parentOrigin !== "*" && event.origin !== parentOrigin) {
                return;
              }
              const requestId = data.request_id;
              try {
                renderPost(data.post, requestId);
              } catch (error) {
                send("render_error", requestId, { error: error && error.stack ? error.stack : String(error) });
              }
            });
        </script>
    </body>
</html>
