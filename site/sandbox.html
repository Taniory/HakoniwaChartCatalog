<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; connect-src 'none'; img-src 'none'; media-src 'none'; font-src 'none'; script-src 'unsafe-inline'; script-src-attr 'none'; style-src 'unsafe-inline'; base-uri 'none'; form-action 'none'; object-src 'none';"
    />
    <title>サンドボックス描画</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #ffffff;
      }

      #chart {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="chart"></div>
    <script id="echarts-inline">
      /*__ECHARTS_INLINE_START__*/
      /*__ECHARTS_INLINE_END__*/
    </script>
    <script id="sandbox-sanitizer">
      (() => {
        const BLOCKED_HTML_TAGS = new Set([
          "script",
          "iframe",
          "object",
          "embed",
          "link",
          "meta",
          "style",
          "base",
          "form",
        ]);
        const URL_ATTRS = new Set(["href", "src", "xlink:href"]);

        function _isAllowedUrl(raw, allowedHosts) {
          if (typeof raw !== "string") {
            return false;
          }
          const value = raw.trim();
          if (!value) {
            return true;
          }
          if (/^(?:javascript|data|vbscript|file):/i.test(value)) {
            return false;
          }
          if (/^\/\//.test(value)) {
            return false;
          }
          if (/^(?:\/(?!\/)|\.\/|\.\.\/|#)/.test(value)) {
            return true;
          }
          try {
            const parsed = new URL(value, window.location.href);
            if (parsed.protocol !== "http:" && parsed.protocol !== "https:") {
              return false;
            }
            return allowedHosts.has(parsed.hostname);
          } catch {
            return false;
          }
        }

        function _sanitizeHtml(input, allowedHosts) {
          const template = document.createElement("template");
          template.innerHTML = String(input);
          const nodes = template.content.querySelectorAll("*");
          for (const node of nodes) {
            const tagName = node.tagName.toLowerCase();
            if (BLOCKED_HTML_TAGS.has(tagName)) {
              node.remove();
              continue;
            }
            for (const attr of [...node.attributes]) {
              const name = attr.name.toLowerCase();
              const value = attr.value || "";
              if (name === "style" || /^on/i.test(name)) {
                node.removeAttribute(attr.name);
                continue;
              }
              if (URL_ATTRS.has(name) && !_isAllowedUrl(value, allowedHosts)) {
                node.removeAttribute(attr.name);
              }
            }
          }
          return template.innerHTML;
        }

        function _sanitizeHtmlResult(result, allowedHosts) {
          if (result == null) {
            return result;
          }
          if (typeof result === "string") {
            return _sanitizeHtml(result, allowedHosts);
          }
          if (
            typeof HTMLElement !== "undefined" &&
            result instanceof HTMLElement
          ) {
            return _sanitizeHtml(result.outerHTML, allowedHosts);
          }
          return result;
        }

        function _wrapHtmlFormatter(target, key, allowedHosts) {
          if (!target || typeof target !== "object" || !(key in target)) {
            return;
          }
          const original = target[key];
          if (typeof original === "function") {
            target[key] = function _wrappedFormatter(...args) {
              return _sanitizeHtmlResult(
                original.apply(this, args),
                allowedHosts,
              );
            };
            return;
          }
          if (typeof original === "string") {
            target[key] = _sanitizeHtml(original, allowedHosts);
          }
        }

        function _validateOptionUrls(value, allowedHosts, path = "option") {
          if (!value || typeof value !== "object") {
            return;
          }
          if (Array.isArray(value)) {
            value.forEach((item, index) => {
              _validateOptionUrls(item, allowedHosts, `${path}[${index}]`);
            });
            return;
          }
          for (const [key, nextValue] of Object.entries(value)) {
            const currentPath = `${path}.${key}`;
            if (
              (key === "link" || key === "sublink") &&
              typeof nextValue === "string" &&
              !_isAllowedUrl(nextValue, allowedHosts)
            ) {
              throw new Error(`許可されていない URL です: ${currentPath}`);
            }
            if (nextValue && typeof nextValue === "object") {
              _validateOptionUrls(nextValue, allowedHosts, currentPath);
            }
          }
        }

        function _enforceSaveAsImageName(targetOption) {
          const saveAsImage = targetOption?.toolbox?.feature?.saveAsImage;
          if (!saveAsImage || typeof saveAsImage !== "object") {
            return;
          }
          const text = String(saveAsImage.name || "chart")
            .normalize("NFKC")
            .replace(/[\\/:*?"<>|\u0000-\u001f]/g, "_")
            .replace(/\s+/g, " ")
            .trim()
            .slice(0, 64);
          saveAsImage.name = text || "chart";
        }

        /**
         * 描画前に ECharts option を安全化する。
         * この関数は option を破壊的に更新する。
         * 主な処理は次のとおり。
         * - tooltip.formatter / series[].tooltip.formatter / toolbox.feature.dataView.optionToContent の戻り値または文字列をサニタイズする。
         * - サニタイズ時は script / iframe / object / embed / link / meta / style / base / form タグを除去する。
         * - すべての要素で style 属性と on* イベント属性を除去する。
         * - href / src / xlink:href は URL 検証し、未許可なら属性を除去する。
         * - URL 検証では javascript: / data: / vbscript: / file: と // 形式を拒否し、/ / ./ / ../ / # の相対参照は許可する。
         * - 絶対 URL は http: / https: のみ許可し、allowedHosts に含まれる host のみ許可する。
         * - option 全体を再帰走査して link / sublink を検証し、未許可 URL を検出した場合は例外を送出する。
         * - toolbox.feature.saveAsImage.name を NFKC 正規化し、危険文字を _ に置換して長さを 64 文字に制限する。
         * @param {object} option 検証・正規化対象の option。
         * @param {Set<string>} allowedHosts 許可する URL host の集合。
         * @throws {Error} option が object でない場合、または未許可 URL が含まれる場合。
         * @returns {void}
         */
        function hardenOption(option, allowedHosts) {
          if (!option || typeof option !== "object") {
            throw new Error("option が構築されませんでした");
          }

          _wrapHtmlFormatter(option.tooltip, "formatter", allowedHosts);
          if (Array.isArray(option.series)) {
            for (const series of option.series) {
              _wrapHtmlFormatter(series?.tooltip, "formatter", allowedHosts);
            }
          }
          _wrapHtmlFormatter(
            option?.toolbox?.feature?.dataView,
            "optionToContent",
            allowedHosts,
          );
          _validateOptionUrls(option, allowedHosts);
          _enforceSaveAsImageName(option);
        }

        window.SandboxSanitizer = {
          hardenOption,
        };
      })();
    </script>
    <script id="sandbox-utils">
      (() => {
        function createLocalHostAllowList() {
          return new Set([window.location.hostname, "localhost", "127.0.0.1"]);
        }

        function cloneJson(value) {
          return JSON.parse(JSON.stringify(value));
        }

        function isAllowedParentOrigin(origin, allowedHosts) {
          if (typeof origin !== "string" || !origin || origin === "null") {
            return false;
          }
          try {
            const parsed = new URL(origin);
            if (parsed.protocol !== "http:" && parsed.protocol !== "https:") {
              return false;
            }
            return allowedHosts.has(parsed.hostname);
          } catch {
            return false;
          }
        }

        function createSectionRunner() {
          let sectionCounter = 0;

          function buildSectionScriptText(executionKey, sectionSource) {
            return [
              '"use strict";',
              "(() => {",
              "const state = window.__sandboxExecutionState;",
              `if (!state || state.key !== ${JSON.stringify(executionKey)}) { return; }`,
              "const context = state.context;",
              "const post = context.post;",
              "const echarts = context.echarts;",
              "const rawData = context.rawData;",
              "let transformedData = context.transformedData;",
              "let option = context.option;",
              sectionSource,
              "context.transformedData = transformedData;",
              "context.option = option;",
              "})();",
            ].join("\n");
          }

          function onError(executionKey, event) {
            const current = window.__sandboxExecutionState;
            if (!current || current.key !== executionKey) {
              return;
            }
            const message = event?.message || "script error";
            current.error = event?.error || new Error(message);
            event.preventDefault();
          }

          return function runSection(source, context) {
            if (!source) {
              return;
            }

            const executionKey = `section_${Date.now()}_${sectionCounter++}`;
            window.__sandboxExecutionState = {
              key: executionKey,
              context,
              error: null,
            };
            const errorListener = (event) => onError(executionKey, event);
            window.addEventListener("error", errorListener);

            let result = null;
            try {
              const script = document.createElement("script");
              script.text = buildSectionScriptText(executionKey, source);
              document.body.appendChild(script);
              script.remove();
              result = window.__sandboxExecutionState;
            } finally {
              window.removeEventListener("error", errorListener);
              delete window.__sandboxExecutionState;
            }

            if (result && result.error) {
              throw result.error;
            }
          };
        }

        window.SandboxUtils = {
          cloneJson,
          createLocalHostAllowList,
          createSectionRunner,
          isAllowedParentOrigin,
        };
      })();
    </script>
    <script id="sandbox-runtime">
      (() => {
        const utils = window.SandboxUtils;
        const sanitizer = window.SandboxSanitizer;
        if (!utils) {
          throw new Error("sandbox utils is unavailable");
        }
        if (!sanitizer || typeof sanitizer.hardenOption !== "function") {
          throw new Error("sandbox sanitizer is unavailable");
        }

        const chartDom = document.getElementById("chart");
        const allowedHosts = utils.createLocalHostAllowList();
        const runSection = utils.createSectionRunner();

        let chart = null;
        let parentOrigin = "*";
        let channelToken = null;

        function send(type, requestId, payload) {
          if (!requestId || !channelToken) {
            return;
          }
          parent.postMessage(
            {
              type,
              request_id: requestId,
              channel_token: channelToken,
              ...payload,
            },
            parentOrigin,
          );
        }

        function renderPost(post, requestId) {
          if (!post || typeof post !== "object") {
            throw new Error("post payload が不正です");
          }

          const sourceData = post.sample_data_json || {};
          const context = {
            post,
            echarts: window.echarts,
            rawData: utils.cloneJson(sourceData),
            transformedData: utils.cloneJson(sourceData),
            option: {},
          };

          runSection(post.transform_js || "", context);
          runSection(post.echarts_js || "", context);
          runSection(post.custom_series_js || "", context);
          sanitizer.hardenOption(context.option, allowedHosts);

          if (chart && typeof chart.dispose === "function") {
            chart.dispose();
          }
          chart = window.echarts.init(chartDom, null, { renderer: "canvas" });
          chart.setOption(context.option);
          chart.resize();
          send("render_ok", requestId, {});
        }

        window.addEventListener("resize", () => {
          if (chart && typeof chart.resize === "function") {
            chart.resize();
          }
        });

        window.addEventListener("message", (event) => {
          if (event.source !== parent) {
            return;
          }

          const data = event.data || {};
          if (
            data.type !== "render" ||
            typeof data.request_id !== "string" ||
            typeof data.channel_token !== "string"
          ) {
            return;
          }

          if (!channelToken) {
            if (!utils.isAllowedParentOrigin(event.origin, allowedHosts)) {
              return;
            }
            channelToken = data.channel_token;
            parentOrigin = event.origin || "*";
          }
          if (data.channel_token !== channelToken) {
            return;
          }
          if (parentOrigin !== "*" && event.origin !== parentOrigin) {
            return;
          }

          const requestId = data.request_id;
          try {
            renderPost(data.post, requestId);
          } catch (error) {
            send("render_error", requestId, {
              error: error && error.stack ? error.stack : String(error),
            });
          }
        });
      })();
    </script>
  </body>
</html>
