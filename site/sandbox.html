<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; connect-src 'none'; img-src 'none'; media-src 'none'; font-src 'none'; script-src 'unsafe-inline'; script-src-attr 'none'; style-src 'unsafe-inline'; base-uri 'none'; form-action 'none'; object-src 'none';"
    />
    <title>サンドボックス描画</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #ffffff;
      }

      #chart {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="chart"></div>
    <script id="echarts-inline">
      /*__ECHARTS_INLINE_START__*/
      /*__ECHARTS_INLINE_END__*/
    </script>
    <script id="dompurify-inline">
      /*__DOMPURIFY_INLINE_START__*/
      /*__DOMPURIFY_INLINE_END__*/
    </script>
    <script id="sandbox-sanitizer">
      /*__SANDBOX_SANITIZER_INLINE_START__*/
      /*__SANDBOX_SANITIZER_INLINE_END__*/
    </script>
    <script id="sandbox-utils">
      (() => {
        function createLocalHostAllowList() {
          return new Set([window.location.hostname, "localhost", "127.0.0.1"]);
        }

        function cloneJson(value) {
          return JSON.parse(JSON.stringify(value));
        }

        function isAllowedParentOrigin(origin, allowedHosts) {
          if (typeof origin !== "string" || !origin || origin === "null") {
            return false;
          }
          try {
            const parsed = new URL(origin);
            if (parsed.protocol !== "http:" && parsed.protocol !== "https:") {
              return false;
            }
            return allowedHosts.has(parsed.hostname);
          } catch {
            return false;
          }
        }

        function createSectionRunner() {
          let sectionCounter = 0;

          function buildSectionScriptText(executionKey, sectionSource) {
            return [
              '"use strict";',
              "(() => {",
              "const state = window.__sandboxExecutionState;",
              `if (!state || state.key !== ${JSON.stringify(executionKey)}) { return; }`,
              "const context = state.context;",
              "const post = context.post;",
              "const echarts = context.echarts;",
              "const rawData = context.rawData;",
              "let transformedData = context.transformedData;",
              "let option = context.option;",
              sectionSource,
              "context.transformedData = transformedData;",
              "context.option = option;",
              "})();",
            ].join("\n");
          }

          function onError(executionKey, event) {
            const current = window.__sandboxExecutionState;
            if (!current || current.key !== executionKey) {
              return;
            }
            const message = event?.message || "script error";
            current.error = event?.error || new Error(message);
            event.preventDefault();
          }

          return function runSection(source, context) {
            if (!source) {
              return;
            }

            const executionKey = `section_${Date.now()}_${sectionCounter++}`;
            window.__sandboxExecutionState = {
              key: executionKey,
              context,
              error: null,
            };
            const errorListener = (event) => onError(executionKey, event);
            window.addEventListener("error", errorListener);

            let result = null;
            try {
              const script = document.createElement("script");
              script.text = buildSectionScriptText(executionKey, source);
              document.body.appendChild(script);
              script.remove();
              result = window.__sandboxExecutionState;
            } finally {
              window.removeEventListener("error", errorListener);
              delete window.__sandboxExecutionState;
            }

            if (result && result.error) {
              throw result.error;
            }
          };
        }

        window.SandboxUtils = {
          cloneJson,
          createLocalHostAllowList,
          createSectionRunner,
          isAllowedParentOrigin,
        };
      })();
    </script>
    <script id="sandbox-runtime">
      (() => {
        const utils = window.SandboxUtils;
        const sanitizer = window.SandboxSanitizer;
        if (!utils) {
          throw new Error("sandbox utils is unavailable");
        }
        if (!sanitizer || typeof sanitizer.hardenOption !== "function") {
          throw new Error("sandbox sanitizer is unavailable");
        }

        const chartDom = document.getElementById("chart");
        const allowedHosts = utils.createLocalHostAllowList();
        const runSection = utils.createSectionRunner();

        let chart = null;
        let parentOrigin = null;
        let channelToken = null;

        function send(type, requestId, payload) {
          if (!requestId || !channelToken || typeof parentOrigin !== "string") {
            return;
          }
          window.parent.postMessage(
            {
              type,
              request_id: requestId,
              channel_token: channelToken,
              ...payload,
            },
            parentOrigin,
          );
        }

        function renderPost(post, requestId) {
          if (!post || typeof post !== "object") {
            throw new Error("post payload is invalid");
          }

          const sourceData = post.sample_data_json || {};
          const context = {
            post,
            echarts: window.echarts,
            rawData: utils.cloneJson(sourceData),
            transformedData: utils.cloneJson(sourceData),
            option: {},
          };

          runSection(post.transform_js || "", context);
          runSection(post.echarts_js || "", context);
          runSection(post.custom_series_js || "", context);
          sanitizer.hardenOption(context.option, allowedHosts);

          if (chart && typeof chart.dispose === "function") {
            chart.dispose();
          }
          chart = window.echarts.init(chartDom, null, { renderer: "canvas" });
          chart.setOption(context.option);
          chart.resize();
          send("render_ok", requestId, {});
        }

        window.addEventListener("resize", () => {
          if (chart && typeof chart.resize === "function") {
            chart.resize();
          }
        });

        window.addEventListener("message", (event) => {
          if (event.source !== window.parent) {
            return;
          }

          const data = event.data || {};
          if (
            data.type !== "render" ||
            typeof data.request_id !== "string" ||
            typeof data.channel_token !== "string"
          ) {
            return;
          }

          if (!channelToken) {
            if (!utils.isAllowedParentOrigin(event.origin, allowedHosts)) {
              return;
            }
            channelToken = data.channel_token;
            parentOrigin = event.origin;
          }
          if (data.channel_token !== channelToken) {
            return;
          }
          if (event.origin !== parentOrigin) {
            return;
          }

          const requestId = data.request_id;
          try {
            renderPost(data.post, requestId);
          } catch (error) {
            send("render_error", requestId, {
              error: error && error.stack ? error.stack : String(error),
            });
          }
        });
      })();
    </script>
  </body>
</html>
